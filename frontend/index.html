<body>

<div class="app-layout">

</div>

            </svg>
            Dashboard
        </button>

        <button onclick="navigate('clients')">
            <svg class="icon" viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 21c0-4 4-7 8-7s8 3 8 7"/>
            </svg>
            Clientes
        </button>

        <button onclick="navigate('projects')">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M3 7h5l2 2h11v11H3z"/>
            </svg>
            Projetos
        </button>

        <button onclick="navigate('checklists')">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M9 11l3 3L22 4"/>

            </svg>

        </button>

        <button onclick="navigate('inspections')">

            NC

        <button onclick="navigate('reports')">
            <svg class="icon" viewBox="0 0 24 24">

                <line x1="9" y1="13" x2="15" y2="13"/>
                <line x1="9" y1="17" x2="15" y2="17"/>
            </svg>
            Relatórios
        </button>

        <!-- USER CARD -->
<!-- USER CARD -->
<div class="user-card">
    <div class="user-info">
        <div class="avatar">L</div>
        <span class="user-name">Usuário</span>
    </div>

    <!-- ✅ AGRUPAR AQUI -->
    <div class="theme-switch-container">
        <span class="theme-label">Tema</span>

        <div class="theme-switch">
            <input type="checkbox" id="toggleTheme" onclick="toggleTheme()">
            <label for="toggleTheme"></label>
        </div>
    </div>

    <button class="logout-btn" onclick="logout()">Sair da conta</button>
</div>
    </aside>

    <main id="content"></main>

</div>

<script type="module" src="app.js"></script>

<script>
/* ========================
VERIFICAR LOGIN
======================== */
const user = localStorage.getItem("user");

if (!user) {
  window.location.href = "login/";
}

/* ========================
PREENCHER USUÁRIO
======================== */
if (user) {
  document.querySelector(".avatar").innerText = user[0].toUpperCase();
  document.querySelector(".user-name").innerText = user;
}

/* ========================
LOGOUT
======================== */
function logout() {
  localStorage.removeItem("user");
  window.location.href = "login/";
}

function toggleTheme() {
  document.body.classList.toggle("dark-mode");

  const isDark = document.body.classList.contains("dark-mode");
  localStorage.setItem("theme", isDark ? "dark" : "light");
}

/* carregar tema salvo */
const savedTheme = localStorage.getItem("theme");

if (savedTheme === "dark") {
  document.body.classList.add("dark-mode");
  document.getElementById("toggleTheme").checked = true;
}
</script>

</body>
</html>
